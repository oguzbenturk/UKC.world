<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- App Version - Auto-updated by push-all.js on deployment -->
    <meta name="app-version" content="0.1.207" />
    <!-- Cache control meta tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  <!-- Real icons for crawlers/browsers (bundled copy of DPSLOGOS/DPC-transparant-white.svg) -->
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="apple-touch-icon" href="/logo.svg">

  <!-- Plannivo design system fonts (additive — old Duotone/Gotham fonts remain loaded via src/index.css for un-migrated pages) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Mobile-safe viewport: allow drawing into safe areas (notch) and resize content when keyboard shows -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Plannivo</title>
    <meta name="description" content="Plannivo — watersports academy management platform." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0A0A0A" />

  <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plannivo" />
    <meta property="og:description" content="Plannivo — watersports academy management platform." />
  <meta property="og:image" content="https://akyaka.plannivo.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Plannivo" />
  <meta property="og:url" content="https://akyaka.plannivo.com/" />
  <meta property="og:site_name" content="Plannivo" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plannivo" />
    <meta name="twitter:description" content="Plannivo — watersports academy management platform." />
  <meta name="twitter:image" content="https://akyaka.plannivo.com/og-image.png" />
  <meta name="twitter:image:alt" content="Plannivo" />

  <!-- Discovery -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  <link rel="robots" href="/robots.txt" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://akyaka.plannivo.com/" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Plannivo",
        "url": "https://akyaka.plannivo.com/",
        "logo": "https://akyaka.plannivo.com/logo.svg"
      }
    </script>
    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Plannivo",
        "url": "https://akyaka.plannivo.com/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/init.js"></script>
  </body>
</html>
