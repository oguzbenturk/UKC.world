add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
# Content-Security-Policy
# script-src: the 'sha256-...' below is the hash of the inline Google Tag Manager
#   (GTM-NJ3FBHV6) bootstrap in index.html. It lets ONLY that exact inline snippet run
#   (no 'unsafe-inline'). If the GTM snippet in index.html ever changes, recompute the hash
#   (sha256 of the script's text content, LF newlines) or GTM will be CSP-blocked.
# connect-src/frame-src/script-src: GTM + GA4 + Google Ads endpoints, including
#   https://www.googleadservices.com (Ads conversion script conversion.js + its beacons).
#   www.google.com covers /pagead/ conversion pings (whole-origin, no path needed).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-t1kh7XCkfDsDkkWV5fCIAIjtIFY5rUFTRdwYL8VA9yQ=' https://www.googletagmanager.com https://tagmanager.google.com https://www.googleadservices.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' ws: wss: https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://stats.g.doubleclick.net https://googleads.g.doubleclick.net https://www.google.com https://www.googleadservices.com; frame-src https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
