# docker-compose.production.yml
# All Plannivo services + n8n in one compose file.
# Host nginx (systemd) handles ports 80/443 — we never touch it.
#
# Prerequisites (gitignored, uploaded by push-all.js):
#   backend/.env.production   — backend secrets + compose interpolation vars
#   SSL/fullchain.crt         — TLS certificate chain
#   SSL/private.key           — TLS private key
#   dist/                     — pre-built frontend (npm run build locally)
#
# Usage: COMPOSE_PROJECT_NAME=plannivo docker-compose -f docker-compose.production.yml up -d
version: "3.8"

services:
  frontend:
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      # Pre-built frontend (built locally, uploaded via SFTP)
      - ./dist:/usr/share/nginx/html:ro
      # Nginx config (from repo, replaces default.conf)
      - ./infrastructure/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # ACME challenge webroot
      - /root/acme-webroot:/var/www/acme:ro
      # SSL certificates (uploaded via SFTP)
      - ./SSL:/etc/ssl/plannivo:ro
      # Shared uploads volume (serve media directly)
      - uploads_data:/var/www/uploads:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env.production
    depends_on:
      - db
      - redis
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  n8n:
    image: n8nio/n8n:2.15.1
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=n8n.plannivo.com
      - WEBHOOK_URL=https://n8n.plannivo.com
      - N8N_EDITOR_BASE_URL=https://n8n.plannivo.com
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - KAI_AGENT_SECRET=${KAI_AGENT_SECRET}
      - PLANNIVO_API_BASE=http://backend:4000/api/agent
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plannivo}
      POSTGRES_USER: ${POSTGRES_USER:-plannivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plannivo -d plannivo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    env_file:
      - ./backend/.env.production
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  n8n_data:

networks:
  app-network:
    driver: bridge
